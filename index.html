<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Precision Ledger | Financial Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #ffffff; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-text { background: linear-gradient(45deg, #c5a059, #f9f1c7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8">
    <main class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
        <!-- 左侧：品牌展示 -->
        <div class="space-y-6">
            <h2 class="text-sm tracking-[0.3em] uppercase opacity-60">The Financial Atelier</h2>
            <h1 class="text-5xl md:text-7xl font-light leading-tight">
                The <span class="gold-text font-semibold">Precision</span> Ledger
            </h1>
            <p class="text-lg opacity-80 leading-relaxed max-w-sm">
                Experience a sanctuary of clarity. We transform wealth management into a bespoke art form.
            </p>
            <div class="pt-4">
                <a href="mailto:contact@towardm.site" class="px-8 py-3 border border-white hover:bg-white hover:text-black transition-all duration-500 uppercase text-xs tracking-widest">
                    Enter the Atelier
                </a>
            </div>
        </div>

        <!-- 右侧：装饰性卡片 -->
        <div class="glass p-12 aspect-square flex flex-col justify-between relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-yellow-500/10 blur-[80px]"></div>
            <div class="text-4xl font-light opacity-20">01</div>
            <div class="space-y-4">
                <div class="h-[1px] w-12 bg-yellow-600"></div>
                <h3 class="text-xl tracking-wide">Wealth Curation</h3>
                <p class="text-sm opacity-50 italic">"Precision in every decimal, elegance in every strategy."</p>
            </div>
        </div>
    </main>
</body>
</html>
